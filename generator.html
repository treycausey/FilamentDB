<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Generator - FilamentDB</title>
    <meta name="theme-color" content="#FF6B35">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="FilamentDB">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <nav class="nav-header">
            <h1>FilamentDB Generator</h1>
            <div class="nav-links">
                <a href="index.html" class="nav-link">Scanner</a>
                <a href="inventory.html" class="nav-link">Inventory</a>
                <a href="generator.html" class="nav-link active">Generator</a>
            </div>
        </nav>
        
        <div class="generator-section">
            <div class="form-section">
                <h2>Create Filament QR Code</h2>
                <p class="form-description">Enter your filament details to generate a QR code for your spool.</p>
                
                <form id="qrForm" class="qr-form">
                    <div class="form-group">
                        <label for="manufacturer">Manufacturer *</label>
                        <input type="text" id="manufacturer" name="manufacturer" required 
                               placeholder="e.g., Hatchbox, eSUN, PETG">
                    </div>
                    
                    <div class="form-group">
                        <label for="material">Material *</label>
                        <select id="material" name="material" required>
                            <option value="">Select Material</option>
                            <option value="PLA">PLA</option>
                            <option value="PLA+">PLA+</option>
                            <option value="ABS">ABS</option>
                            <option value="PETG">PETG</option>
                            <option value="TPU">TPU</option>
                            <option value="WOOD">WOOD</option>
                            <option value="Metal">Metal</option>
                            <option value="Carbon Fiber">Carbon Fiber</option>
                            <option value="Other">Other</option>
                        </select>
                        <input type="text" id="customMaterial" name="customMaterial" 
                               placeholder="Enter custom material type" 
                               class="custom-material-input hidden">
                    </div>
                    
                    <div class="form-group">
                        <label for="color">Color *</label>
                        <div class="color-input-group">
                            <input type="text" id="color" name="color" required 
                                   placeholder="e.g., Black, White, Red, Blue">
                            <button type="button" id="colorDetectorBtn" class="color-detector-btn" title="Detect color with camera">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
                                    <circle cx="12" cy="13" r="4"></circle>
                                    <circle cx="12" cy="13" r="2" fill="currentColor" opacity="0.3"></circle>
                                </svg>
                            </button>
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label for="temp1">Temperature 1 (°C)</label>
                            <input type="number" id="temp1" name="temp1" min="0" max="350"
                                   placeholder="e.g., 210">
                        </div>
                        
                        <div class="form-group">
                            <label for="temp2">Temperature 2 (°C)</label>
                            <input type="number" id="temp2" name="temp2" min="0" max="350"
                                   placeholder="e.g., 60">
                        </div>
                    </div>
                    
                    <div class="form-actions">
                        <button type="submit" class="generate-btn">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="3" y="3" width="5" height="5"></rect>
                                <rect x="3" y="16" width="5" height="5"></rect>
                                <rect x="16" y="3" width="5" height="5"></rect>
                                <path d="m21 16-3.5-3.5-2.5 2.5"></path>
                                <path d="m21 21-3.5-3.5-2.5 2.5"></path>
                                <path d="m3 21 18-18"></path>
                            </svg>
                            Generate QR Code
                        </button>
                        <button type="reset" class="reset-btn">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M3 6h18l-1.5 15H4.5L3 6Z"></path>
                                <path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                                <line x1="10" y1="11" x2="10" y2="17"></line>
                                <line x1="14" y1="11" x2="14" y2="17"></line>
                            </svg>
                            Clear Form
                        </button>
                    </div>
                </form>
            </div>
            
            <div class="preview-section">
                <div id="qrPreview" class="qr-preview hidden">
                    <h2>Generated QR Code</h2>
                    <div class="qr-container">
                        <div id="qrCodeDisplay" class="qr-display"></div>
                    </div>
                    
                    <div class="qr-info">
                        <h3>Filament Information</h3>
                        <div id="qrData" class="qr-data"></div>
                    </div>
                    
                    <div class="qr-actions">
                        <button id="downloadBtn" class="download-btn">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                <polyline points="7,10 12,15 17,10"></polyline>
                                <line x1="12" y1="15" x2="12" y2="3"></line>
                            </svg>
                            Download PNG
                        </button>
                        <button id="downloadSvgBtn" class="download-svg-btn">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                <polyline points="7,10 12,15 17,10"></polyline>
                                <line x1="12" y1="15" x2="12" y2="3"></line>
                                <path d="M8 3h8l4 4v10a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2z" opacity="0.3"></path>
                            </svg>
                            Download SVG
                        </button>
                        <button id="printBtn" class="print-btn">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="6,9 6,2 18,2 18,9"></polyline>
                                <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path>
                                <rect x="6" y="14" width="12" height="8"></rect>
                                <circle cx="17" cy="11" r="1" fill="currentColor"></circle>
                            </svg>
                            Print
                        </button>
                        <button id="saveToInventoryBtn" class="save-inventory-btn">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
                                <polyline points="17,21 17,13 7,13 7,21"></polyline>
                                <polyline points="7,3 7,8 15,8"></polyline>
                                <circle cx="12" cy="17" r="1" fill="currentColor"></circle>
                            </svg>
                            Save to Inventory
                        </button>
                    </div>
                </div>
                
                <div id="qrPlaceholder" class="qr-placeholder">
                    <div class="placeholder-icon">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="3" width="5" height="5"></rect>
                            <rect x="3" y="16" width="5" height="5"></rect>
                            <rect x="16" y="3" width="5" height="5"></rect>
                            <rect x="11" y="11" width="2" height="2"></rect>
                            <rect x="16" y="16" width="2" height="2"></rect>
                            <rect x="19" y="16" width="2" height="2"></rect>
                            <rect x="16" y="19" width="2" height="2"></rect>
                            <rect x="19" y="19" width="2" height="2"></rect>
                            <path d="m3 3 18 18" opacity="0.1"></path>
                        </svg>
                    </div>
                    <h3>QR Code Preview</h3>
                    <p>Fill out the form to generate your QR code</p>
                </div>
            </div>
        </div>
    </div>
    
    
    <!-- Load dependencies -->
    <script src="shared-qr-processing.js"></script>
    <script src="color-detection.js"></script>
    <script src="color-utils.js"></script>
    
    <!-- Load local QRious library -->
    <script src="qrious-local.js"></script>
    
    
    <script>
        // Simple QR library initialization using local QRious
        document.addEventListener('DOMContentLoaded', function() {
            if (typeof QRious !== 'undefined') {
                console.log('✅ QRious library loaded successfully');
                
                // Create QRCode-compatible interface for existing code
                window.QRCode = {
                    toCanvas: function(canvas, text, options, callback) {
                        try {
                            new QRious({
                                element: canvas,
                                value: text,
                                size: (options && options.width) || 300,
                                level: (options && options.errorCorrectionLevel) || 'M',
                                foreground: (options && options.color && options.color.dark) || '#000000',
                                background: (options && options.color && options.color.light) || '#FFFFFF'
                            });
                            
                            if (callback) callback(null);
                            return Promise.resolve();
                        } catch (error) {
                            if (callback) callback(error);
                            return Promise.reject(error);
                        }
                    },
                    
                    toDataURL: function(text, options) {
                        return new Promise((resolve, reject) => {
                            try {
                                const canvas = document.createElement('canvas');
                                new QRious({
                                    element: canvas,
                                    value: text,
                                    size: (options && options.width) || 300,
                                    level: (options && options.errorCorrectionLevel) || 'M'
                                });
                                resolve(canvas.toDataURL());
                            } catch (error) {
                                reject(error);
                            }
                        });
                    },
                    
                    toString: function(text, options) {
                        if (options && options.type === 'svg') {
                            // Simple SVG fallback
                            const size = options.width || 300;
                            return Promise.resolve(`<svg width="${size}" height="${size}" xmlns="http://www.w3.org/2000/svg">
                                <rect width="${size}" height="${size}" fill="white"/>
                                <text x="${size/2}" y="${size/2}" text-anchor="middle" font-family="Arial" font-size="12">SVG QR not supported</text>
                            </svg>`);
                        }
                        return this.toDataURL(text, options);
                    }
                };
                
                console.log('✅ QRCode interface ready');
            } else {
                console.error('❌ QRious library not found');
            }
        });
    </script>
    <script src="generator.js"></script>
</body>
</html>
