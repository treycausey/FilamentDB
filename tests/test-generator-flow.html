<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator Flow Test - FilamentDB</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 1200px;
            margin: 40px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        h1 { color: #FF6B35; }
        .test-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }
        .panel {
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 20px;
        }
        iframe {
            width: 100%;
            height: 700px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
        }
        .controls {
            margin-bottom: 20px;
        }
        button {
            background: #FF6B35;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            margin-right: 10px;
            cursor: pointer;
        }
        button:hover { background: #E55A2B; }
        .log {
            background: #f9f9f9;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            padding: 10px;
            font-family: monospace;
            font-size: 12px;
            height: 200px;
            overflow-y: auto;
        }
        .log-entry {
            margin: 5px 0;
            padding: 5px;
            border-left: 3px solid #FF6B35;
            background: white;
        }
        .success { border-left-color: #2ECC71; }
        .error { border-left-color: #FF4444; }
    </style>
</head>
<body>
    <h1>FilamentDB - Generator Flow Test</h1>
    <div style="background: #FFD23F; color: #333; padding: 10px; border-radius: 4px; margin-bottom: 20px; font-weight: 600;">
        ⚠️ TEST MODE - Using separate test storage. Your real inventory is protected.
    </div>
    
    <div class="controls">
        <button onclick="fillForm()">1. Fill Form</button>
        <button onclick="generateQR()">2. Generate QR</button>
        <button onclick="saveToInventory()">3. Save to Inventory</button>
        <button onclick="checkInventory()">4. Check Inventory</button>
        <button onclick="runFullTest()">Run Full Test</button>
        <button onclick="clearTestData()">Clear Test Data</button>
        <button onclick="showRealInventory()">Show Real Inventory</button>
        <button onclick="clearLog()">Clear Log</button>
    </div>
    
    <div class="test-grid">
        <div class="panel">
            <h2>Generator</h2>
            <iframe id="generatorFrame" src="generator.html"></iframe>
        </div>
        
        <div class="panel">
            <h2 id="inventoryTitle">Inventory (Empty - Run Test to Add Items)</h2>
            <iframe id="inventoryFrame" src="inventory.html"></iframe>
        </div>
    </div>
    
    <div class="panel">
        <h2>Test Log</h2>
        <div id="log" class="log"></div>
    </div>
    
    <script>
        // Use separate storage key for testing to avoid polluting real inventory
        const TEST_STORAGE_KEY = 'qrCodeEntries_TEST';
        const REAL_STORAGE_KEY = 'qrCodeEntries';
        
        // Backup and restore functions
        let originalInventory = null;
        
        function backupRealInventory() {
            originalInventory = localStorage.getItem(REAL_STORAGE_KEY);
            if (originalInventory) {
                localStorage.setItem(TEST_STORAGE_KEY, originalInventory);
            }
            log('Backed up real inventory for testing', 'success');
        }
        
        function useTestInventory() {
            // Temporarily swap the storage keys
            const testData = localStorage.getItem(TEST_STORAGE_KEY) || '[]';
            localStorage.setItem(REAL_STORAGE_KEY, testData);
        }
        
        function restoreRealInventory() {
            if (originalInventory !== null) {
                localStorage.setItem(REAL_STORAGE_KEY, originalInventory);
            }
            log('Restored original inventory', 'success');
        }
        
        function log(message, type = 'info') {
            const logEl = document.getElementById('log');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logEl.appendChild(entry);
            logEl.scrollTop = logEl.scrollHeight;
        }
        
        function clearLog() {
            document.getElementById('log').innerHTML = '';
            log('Log cleared');
        }
        
        function clearTestData() {
            // Clear test storage
            localStorage.removeItem(TEST_STORAGE_KEY);
            localStorage.setItem(TEST_STORAGE_KEY, '[]');  // Set to empty array
            log('Test data cleared', 'success');
            
            // Ensure real inventory is restored
            if (originalInventory !== null) {
                localStorage.setItem(REAL_STORAGE_KEY, originalInventory);
                log('Real inventory is protected', 'success');
            }
            
            // Refresh the inventory frame to show empty test inventory
            const frame = document.getElementById('inventoryFrame');
            
            // Temporarily set empty test data to show cleared state
            const currentReal = localStorage.getItem(REAL_STORAGE_KEY);
            localStorage.setItem(REAL_STORAGE_KEY, '[]');
            
            // Reload frame
            frame.src = frame.src;
            
            // After reload, restore real inventory
            setTimeout(() => {
                localStorage.setItem(REAL_STORAGE_KEY, currentReal || originalInventory || '[]');
                document.getElementById('inventoryTitle').textContent = 'Inventory (Test Mode - Empty)';
                log('Inventory view refreshed - test inventory is now empty', 'success');
            }, 500);
        }
        
        function showRealInventory() {
            // Show the real inventory temporarily for comparison
            const frame = document.getElementById('inventoryFrame');
            
            // Ensure real inventory is active
            if (originalInventory !== null) {
                localStorage.setItem(REAL_STORAGE_KEY, originalInventory);
            }
            
            // Reload frame
            frame.src = frame.src;
            
            log('Showing REAL inventory (read-only view)', 'success');
            const realCount = originalInventory ? JSON.parse(originalInventory).length : 0;
            log(`Real inventory has ${realCount} items`, 'success');
            document.getElementById('inventoryTitle').textContent = `Inventory (REAL - ${realCount} items)`;
        }
        
        async function fillForm() {
            try {
                const frame = document.getElementById('generatorFrame');
                const doc = frame.contentDocument || frame.contentWindow.document;
                
                // Wait for the form elements to be available
                const manufacturer = doc.getElementById('manufacturer');
                const material = doc.getElementById('material');
                const color = doc.getElementById('color');
                const temp1 = doc.getElementById('temp1');
                const temp2 = doc.getElementById('temp2');
                
                if (!manufacturer) {
                    log('Form not ready yet. Please wait for page to load completely.', 'error');
                    return;
                }
                
                // Fill the form
                manufacturer.value = 'Prusament';
                material.value = 'PETG';
                color.value = 'Orange';
                temp1.value = '240';
                temp2.value = '85';
                
                log('Form filled with test data', 'success');
            } catch (error) {
                log(`Error filling form: ${error.message}`, 'error');
            }
        }
        
        async function generateQR() {
            try {
                const frame = document.getElementById('generatorFrame');
                const doc = frame.contentDocument || frame.contentWindow.document;
                
                // Click generate button
                const generateBtn = doc.querySelector('.generate-btn');
                if (generateBtn) {
                    generateBtn.click();
                    log('QR code generation triggered', 'success');
                    
                    // Wait for QR to generate
                    setTimeout(() => {
                        const qrDisplay = doc.getElementById('qrCodeDisplay');
                        if (qrDisplay && qrDisplay.querySelector('canvas')) {
                            log('QR code generated successfully', 'success');
                        } else {
                            log('QR code not found', 'error');
                        }
                    }, 1000);
                } else {
                    log('Generate button not found', 'error');
                }
            } catch (error) {
                log(`Error generating QR: ${error.message}`, 'error');
            }
        }
        
        async function saveToInventory() {
            try {
                const frame = document.getElementById('generatorFrame');
                const doc = frame.contentDocument || frame.contentWindow.document;
                
                // Use test inventory
                backupRealInventory();
                
                // Click save button
                const saveBtn = doc.getElementById('saveToInventoryBtn');
                if (saveBtn) {
                    saveBtn.click();
                    log('Save to TEST inventory clicked', 'success');
                    
                    // Check if saved and restore real inventory
                    setTimeout(() => {
                        const entries = localStorage.getItem(REAL_STORAGE_KEY);
                        if (entries) {
                            const parsed = JSON.parse(entries);
                            log(`TEST inventory now has ${parsed.length} entries`, 'success');
                            
                            // Save test data separately
                            localStorage.setItem(TEST_STORAGE_KEY, entries);
                            
                            // Update title
                            document.getElementById('inventoryTitle').textContent = `Inventory (Test Mode - ${parsed.length} items)`;
                        }
                        
                        // Restore real inventory immediately
                        restoreRealInventory();
                    }, 500);
                } else {
                    log('Save button not found', 'error');
                }
            } catch (error) {
                log(`Error saving: ${error.message}`, 'error');
                restoreRealInventory();
            }
        }
        
        async function checkInventory() {
            try {
                // Temporarily use test inventory for checking
                backupRealInventory();
                localStorage.setItem(REAL_STORAGE_KEY, localStorage.getItem(TEST_STORAGE_KEY) || '[]');
                
                // Reload inventory frame
                const frame = document.getElementById('inventoryFrame');
                frame.src = frame.src;
                
                setTimeout(() => {
                    const doc = frame.contentDocument || frame.contentWindow.document;
                    const entries = doc.querySelectorAll('.entry-card-grid, .entries-table tr');
                    log(`Found ${entries.length} entries in TEST inventory view`, 'success');
                    
                    // Check for our test entry
                    const content = doc.body.textContent;
                    if (content.includes('Prusament') && content.includes('PETG')) {
                        log('Test entry found in TEST inventory!', 'success');
                    }
                    
                    // Update title
                    document.getElementById('inventoryTitle').textContent = `Inventory (Test Mode - ${entries.length} items)`;
                    
                    // Restore real inventory
                    restoreRealInventory();
                }, 1000);
            } catch (error) {
                log(`Error checking inventory: ${error.message}`, 'error');
                restoreRealInventory();
            }
        }
        
        async function runFullTest() {
            log('Starting full test sequence...');
            
            await fillForm();
            await new Promise(r => setTimeout(r, 1000));
            
            await generateQR();
            await new Promise(r => setTimeout(r, 2000));
            
            await saveToInventory();
            await new Promise(r => setTimeout(r, 1000));
            
            await checkInventory();
            
            log('Full test sequence completed!', 'success');
        }
        
        // Wait for iframes to load
        function waitForIframes() {
            const generatorFrame = document.getElementById('generatorFrame');
            const inventoryFrame = document.getElementById('inventoryFrame');
            let attempts = 0;
            
            function checkFrames() {
                attempts++;
                try {
                    const genDoc = generatorFrame.contentDocument || generatorFrame.contentWindow.document;
                    const invDoc = inventoryFrame.contentDocument || inventoryFrame.contentWindow.document;
                    
                    // Check if critical elements exist
                    const formReady = genDoc && genDoc.getElementById('manufacturer');
                    const inventoryReady = invDoc && invDoc.getElementById('entriesList');
                    
                    if (formReady && inventoryReady) {
                        log('Test environment ready - both frames loaded', 'success');
                    } else if (attempts < 10) {
                        setTimeout(checkFrames, 500);
                    } else {
                        log('Warning: Some frames may not be fully loaded', 'error');
                    }
                } catch (e) {
                    if (e.message.includes('cross-origin')) {
                        log('⚠️ CORS Error: Please access this test via http://localhost:3000/test-generator-flow.html', 'error');
                        log('The test must be run through a web server, not as a file:// URL', 'error');
                    } else if (attempts < 10) {
                        setTimeout(checkFrames, 500);
                    } else {
                        log('Error loading frames: ' + e.message, 'error');
                    }
                }
            }
            
            setTimeout(checkFrames, 1000);
        }
        
        // Check if running from localhost
        if (window.location.protocol === 'file:') {
            log('⚠️ Please access this test via http://localhost:3000/test-generator-flow.html', 'error');
            log('Run "npm start" and then open the URL above', 'error');
        } else {
            // Initialize when page loads
            window.addEventListener('load', waitForIframes);
            log('Test environment initializing...');
            
            // Backup real inventory on load
            originalInventory = localStorage.getItem(REAL_STORAGE_KEY);
            log('Real inventory backed up (' + (originalInventory ? JSON.parse(originalInventory).length : 0) + ' items)', 'success');
            
            // Ensure real inventory is restored on page unload
            window.addEventListener('beforeunload', () => {
                if (originalInventory !== null) {
                    localStorage.setItem(REAL_STORAGE_KEY, originalInventory);
                }
            });
        }
    </script>
</body>
</html>
