<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory - FilamentDB</title>
    <meta name="theme-color" content="#FF6B35">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="FilamentDB">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <nav class="nav-header">
            <h1>FilamentDB</h1>
            <div class="nav-links">
                <a href="index.html" class="nav-link">Scanner</a>
                <a href="inventory.html" class="nav-link active">Inventory</a>
                <a href="generator.html" class="nav-link">Generator</a>
                <a href="settings.html" class="nav-link">Settings</a>
            </div>
            
        </nav>
        
        <div class="inventory-stats">
            <div class="stat-card">
                <div class="stat-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                        <polyline points="14,2 14,8 20,8"></polyline>
                        <line x1="16" y1="13" x2="8" y2="13"></line>
                        <line x1="16" y1="17" x2="8" y2="17"></line>
                        <polyline points="10,9 9,9 8,9"></polyline>
                    </svg>
                </div>
                <div class="stat-value" id="totalEntries">0</div>
                <div class="stat-label">Total Entries</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 3h18v18H3z"></path>
                        <path d="M8 12h8"></path>
                        <path d="M12 8v8"></path>
                        <circle cx="12" cy="12" r="3" fill="none"></circle>
                        <path d="M3 3l18 18" opacity="0.1"></path>
                    </svg>
                </div>
                <div class="stat-value" id="uniqueManufacturers">0</div>
                <div class="stat-label">Manufacturers</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 2L2 7l10 5 10-5-10-5z"></path>
                        <path d="m2 17 10 5 10-5"></path>
                        <path d="m2 12 10 5 10-5"></path>
                        <circle cx="12" cy="12" r="2" fill="currentColor" opacity="0.3"></circle>
                    </svg>
                </div>
                <div class="stat-value" id="uniqueMaterials">0</div>
                <div class="stat-label">Materials</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"></circle>
                        <path d="M12 2a10 10 0 0 1 0 20" fill="#ff6b6b" opacity="0.8"></path>
                        <path d="M12 2a10 10 0 0 1 8.66 5" fill="#4ecdc4" opacity="0.6"></path>
                        <path d="M12 2a10 10 0 0 1 8.66 15" fill="#45b7d1" opacity="0.4"></path>
                        <path d="M12 2a10 10 0 0 1 0 10" fill="#f7d794" opacity="0.5"></path>
                    </svg>
                </div>
                <div class="stat-value" id="uniqueColors">0</div>
                <div class="stat-label">Colors</div>
            </div>
        </div>
        
        <div class="inventory-controls">
            <div class="search-sort-controls">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="Search inventory..." class="search-input">
                    <span class="search-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.35-4.35"></path>
                        </svg>
                    </span>
                </div>
                <div class="sort-box">
                    <label for="sortSelect" class="sort-label">Sort by:</label>
                    <select id="sortSelect" class="sort-select">
                        <option value="color-rainbow" selected>Color (Rainbow)</option>
                        <option value="date-desc">Date (Newest First)</option>
                        <option value="date-asc">Date (Oldest First)</option>
                        <option value="manufacturer">Manufacturer (A-Z)</option>
                        <option value="material">Material (A-Z)</option>
                        <option value="color">Color (A-Z)</option>
                        <option value="temp1">Temp1 (Low to High)</option>
                        <option value="temp2">Temp2 (Low to High)</option>
                    </select>
                </div>
                <div class="filters-inline">
                    <div class="filter-item">
                        <label for="manufacturerFilter" class="sort-label">Manufacturer:</label>
                        <select id="manufacturerFilter" class="filter-select">
                            <option value="">All Manufacturers</option>
                        </select>
                    </div>
                    <div class="filter-item">
                        <label for="materialFilter" class="sort-label">Material:</label>
                        <select id="materialFilter" class="filter-select">
                            <option value="">All Materials</option>
                        </select>
                    </div>
                    <div class="filter-item">
                        <label for="colorFilter" class="sort-label">Color:</label>
                        <select id="colorFilter" class="filter-select">
                            <option value="">All Colors</option>
                        </select>
                    </div>
                </div>
            </div>
            
            <div class="bulk-actions">
                <button id="exportButton" class="export-button">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="7,10 12,15 17,10"></polyline>
                        <line x1="12" y1="15" x2="12" y2="3"></line>
                    </svg>
                    Export CSV
                </button>
                <button id="importButton" class="import-button">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="17,8 12,3 7,8"></polyline>
                        <line x1="12" y1="3" x2="12" y2="15"></line>
                    </svg>
                    Import CSV
                </button>
                <input type="file" id="importFile" accept=".csv" hidden>
                <button id="cloudSyncButton" class="cloud-sync-button">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"></path>
                        <polyline points="16 11 12 15 8 11"></polyline>
                        <line x1="12" y1="15" x2="12" y2="3"></line>
                    </svg>
                    <span id="cloudSyncText">Cloud Sync</span>
                </button>
                <button id="revertCloudButton" class="import-button" title="Replace local inventory with cloud copy">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 12a9 9 0 1 0 9-9"></path>
                        <polyline points="3,3 3,9 9,9"></polyline>
                    </svg>
                    Revert to Cloud
                </button>
                <button id="clearAllButton" class="clear-all-button">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="3,6 5,6 21,6"></polyline>
                        <path d="m19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                        <line x1="10" y1="11" x2="10" y2="17"></line>
                        <line x1="14" y1="11" x2="14" y2="17"></line>
                    </svg>
                    Clear All
                </button>
            </div>
        </div>
        
        <div class="filter-tags" id="filterTags"></div>
        
        <div class="entries-view-toggle">
            <button class="view-toggle" data-view="grid">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="7" height="7"></rect>
                    <rect x="14" y="3" width="7" height="7"></rect>
                    <rect x="14" y="14" width="7" height="7"></rect>
                    <rect x="3" y="14" width="7" height="7"></rect>
                </svg>
                Grid View
            </button>
            <button class="view-toggle active" data-view="list">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="8" y1="6" x2="21" y2="6"></line>
                    <line x1="8" y1="12" x2="21" y2="12"></line>
                    <line x1="8" y1="18" x2="21" y2="18"></line>
                    <line x1="3" y1="6" x2="3.01" y2="6"></line>
                    <line x1="3" y1="12" x2="3.01" y2="12"></line>
                    <line x1="3" y1="18" x2="3.01" y2="18"></line>
                </svg>
                List View
            </button>
        </div>
        
        <div id="entriesList" class="entries-list list-view"></div>
        
        <div id="emptyState" class="empty-state hidden">
            <div class="empty-icon">
                <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"></path>
                    <path d="m3.3 7 8.7 5 8.7-5"></path>
                    <path d="M12 22V12"></path>
                    <circle cx="12" cy="12" r="2" fill="currentColor" opacity="0.2"></circle>
                </svg>
            </div>
            <h2>No Inventory Items</h2>
            <p>Start scanning QR codes to build your inventory</p>
            <a href="index.html" class="button-primary">Go to Scanner</a>
        </div>
    </div>
    
    <script src="color-detection.js"></script>
    <script src="theme.js"></script>
    <script src="color-utils.js"></script>
    <script src="cloud-storage.js"></script>
    <script src="fcx-client.js"></script>
    <script src="inventory.js"></script>
</body>
</html>
