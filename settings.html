<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - FilamentDB</title>
    <meta name="theme-color" content="#FF6B35">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="FilamentDB">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="styles.css">
    <style>
        .settings-section { margin: 24px 0; }
        .settings-card { background: var(--white); border-radius: var(--radius-lg); box-shadow: var(--shadow-md); padding: 16px; margin-bottom: 16px; }
        .settings-card h3 { margin: 0 0 8px 0; }
        .settings-actions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
        .settings-button { background: var(--primary); color: var(--white); border: none; padding: 8px 12px; border-radius: 8px; cursor: pointer; }
        .secondary-button { background: var(--gray-200); color: var(--gray-900); }
        .danger-button { background: #e53935; }
        .switch { display: inline-flex; align-items: center; gap: 8px; }
        .status-pill { display:inline-block; padding: 2px 8px; border-radius: 999px; font-size: 12px; background: var(--gray-200); color: var(--gray-900); }
        .status-pill.ok { background: #e6f7f1; color: #0f8c66; }
        .status-pill.warn { background: #fff4e5; color: #9a5b00; }
        .muted { color: var(--gray-600); font-size: 0.9rem; }
    </style>
    
</head>
<body>
    <div class="container">
        <nav class="nav-header">
            <h1>FilamentDB</h1>
            <div class="nav-links">
                <a href="index.html" class="nav-link">Scanner</a>
                <a href="inventory.html" class="nav-link">Inventory</a>
                <a href="generator.html" class="nav-link">Generator</a>
                <a href="settings.html" class="nav-link active">Settings</a>
            </div>
        </nav>

        <section class="settings-section">
            <div class="settings-card">
                <h3>Accent Color</h3>
                <div class="muted">Change the app’s accent (buttons and highlights).</div>
                <div class="settings-actions" style="align-items:center;gap:10px;flex-wrap:wrap;margin-top:12px;">
                    <input type="color" id="accentPicker" value="#FF6B35" title="Pick a color" style="width:44px;height:32px;border:none;background:transparent;cursor:pointer">
                    <button class="settings-button" id="applyAccentBtn">Apply</button>
                    <button class="settings-button secondary-button" id="resetAccentBtn">Reset</button>
                    <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">
                        <span class="muted">Presets:</span>
                        <button class="settings-button secondary-button preset-accent" data-hex="#FF6B35" style="background:#FF6B35;color:#fff;border:none">Orange</button>
                        <button class="settings-button secondary-button preset-accent" data-hex="#00A3FF" style="background:#00A3FF;color:#fff;border:none">Blue</button>
                        <button class="settings-button secondary-button preset-accent" data-hex="#6C5CE7" style="background:#6C5CE7;color:#fff;border:none">Violet</button>
                        <button class="settings-button secondary-button preset-accent" data-hex="#2ECC71" style="background:#2ECC71;color:#fff;border:none">Green</button>
                        <button class="settings-button secondary-button preset-accent" data-hex="#E84393" style="background:#E84393;color:#fff;border:none">Pink</button>
                    </div>
                </div>
            </div>

            <div class="settings-card">
                <h3>Color Suggestions (filamentcolors)</h3>
                <div class="muted">Uses local snapshots for offline, precise color suggestions.</div>
                <div class="settings-actions" style="margin-top:12px;">
                    <label class="switch"><input type="checkbox" id="offlineOnlyToggle" checked> <span>Use local snapshots only</span></label>
                    <button class="settings-button secondary-button" id="rebuildSnapshotBtn">Rebuild Snapshots (Fetch)</button>
                    <button class="settings-button secondary-button" id="clearSnapshotBtn">Clear Local Snapshots</button>
                </div>
                <div id="snapshotStatus" class="muted" style="margin-top:8px;">Status: Unknown</div>
            </div>

            <div class="settings-card">
                <h3>Cloud Sync</h3>
                <div class="muted" id="cloudStatusText">Loading status…</div>
                <div style="margin-top:8px;">
                    <span id="cloudConfiguredPill" class="status-pill">Not Configured</span>
                    <span id="cloudEnabledPill" class="status-pill">Disabled</span>
                </div>
                <div class="settings-actions" style="margin-top:12px;">
                    <button class="settings-button" id="syncNowBtn">Sync Now</button>
                    <button class="settings-button secondary-button" id="showSharingBtn">Show Sharing Info</button>
                    <button class="settings-button secondary-button" id="setupNewBtn">Setup (New Storage)</button>
                    <button class="settings-button secondary-button" id="connectExistingBtn">Setup (Additional Device)</button>
                    <button class="settings-button danger-button" id="resetSyncBtn">Reset Cloud Sync</button>
                </div>
                <div style="margin-top:12px;" class="switch">
                    <input type="checkbox" id="enableCloudToggle">
                    <label for="enableCloudToggle">Enable Cloud Sync</label>
                </div>
            </div>

            <div class="settings-card">
                <h3>App</h3>
                <div class="settings-actions">
                    <button class="settings-button secondary-button" id="exportJsonBtn">Export Inventory (JSON)</button>
                    <button class="settings-button secondary-button" id="exportCsvBtn">Export Inventory (CSV)</button>
                    <button class="settings-button danger-button" id="clearAllBtn">Clear All Inventory</button>
                </div>
            </div>
        </section>
    </div>
    <script src="src/utils/theme.js"></script>
    <script src="src/utils/cloud-storage.js"></script>
    <script src="src/js/settings.js"></script>
</body>
</html>
