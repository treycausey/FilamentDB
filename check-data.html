<!DOCTYPE html>
<html>
<head>
    <title>Data Check</title>
</head>
<body>
    <h1>Checking Inventory Data</h1>
    <div id="output"></div>
    
    <script>
        const output = document.getElementById('output');
        
        // Check both possible storage keys
        const oldData = localStorage.getItem('qrCodeEntries');
        const newData = localStorage.getItem('filamentInventory');
        
        let result = '<h2>LocalStorage Contents:</h2>';
        result += `<p><strong>qrCodeEntries:</strong> ${oldData ? `${JSON.parse(oldData).length} entries found` : 'No data'}</p>`;
        result += `<p><strong>filamentInventory:</strong> ${newData ? `${JSON.parse(newData).length} entries found` : 'No data'}</p>`;
        
        if (oldData) {
            const entries = JSON.parse(oldData);
            result += '<h3>Sample Entry:</h3>';
            result += `<pre>${JSON.stringify(entries[0] || 'No entries', null, 2)}</pre>`;
        }
        
        output.innerHTML = result;
    </script>
</body>
</html>
