<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FilamentDB</title>
    <meta name="theme-color" content="#FF6B35">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="FilamentDB">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <nav class="nav-header">
            <h1>FilamentDB</h1>
            <div class="nav-links">
                <a href="index.html" class="nav-link active">Scanner</a>
                <a href="inventory.html" class="nav-link">Inventory</a>
                <a href="generator.html" class="nav-link">Generator</a>
                <a href="settings.html" class="nav-link">Settings</a>
            </div>
        </nav>
        
        <div class="upload-section">
            <div class="upload-options">
                <div class="upload-box">
                    <input type="file" id="fileInput" accept="image/*" hidden>
                    <label for="fileInput" class="upload-button">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="17,8 12,3 7,8"></polyline>
                            <line x1="12" y1="3" x2="12" y2="15"></line>
                            <circle cx="12" cy="3" r="1" fill="currentColor"></circle>
                        </svg>
                        <span>Choose File</span>
                    </label>
                </div>

                <div class="camera-box">
                    <button id="cameraButton" class="camera-button">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
                            <circle cx="12" cy="13" r="4"></circle>
                            <circle cx="12" cy="13" r="2" fill="currentColor" opacity="0.3"></circle>
                            <path d="m9 9 3 3 3-3" stroke-width="1" opacity="0.5"></path>
                        </svg>
                        <span>Scan with Camera</span>
                    </button>
                </div>
                
                <div class="paste-box">
                    <button id="pasteButton" class="paste-button">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                            <rect x="11" y="11" width="3" height="2" fill="currentColor" opacity="0.3" rx="0.5"></rect>
                            <rect x="11" y="14" width="5" height="1.5" fill="currentColor" opacity="0.2" rx="0.5"></rect>
                            <rect x="11" y="16" width="4" height="1.5" fill="currentColor" opacity="0.2" rx="0.5"></rect>
                        </svg>
                        <span>Paste from Clipboard</span>
                    </button>
                </div>
            </div>
            
            <div class="paste-area" id="pasteArea">
                <p>Or paste an image here (Ctrl+V / Cmd+V)</p>
            </div>
        </div>
        
        <div id="imagePreview" class="image-preview hidden">
            <h2>Image Preview</h2>
            <img id="previewImage" alt="QR Code Image">
        </div>
        
        <div id="resultSection" class="result-section hidden">
            <h2>QR Code Content</h2>
            <div id="resultContent" class="result-content"></div>
            <div class="action-buttons">
                <button id="saveButton" class="save-button">Save Entry</button>
                <button id="clearButton" class="clear-button">Clear</button>
            </div>
        </div>
        
        <div id="recentScans" class="recent-scans-section">
            <div class="recent-header">
                <h2>Recent Scans</h2>
                <a href="inventory.html" class="view-all-link">View All →</a>
            </div>
            <div id="recentList" class="recent-list"></div>
        </div>
        
        <div id="errorMessage" class="error-message hidden"></div>
    </div>

    <!-- Camera Modal -->
    <div id="cameraModal" class="camera-modal hidden">
        <div class="camera-content">
            <div class="camera-header">
                <h2>Scan QR Code with Camera</h2>
                <button id="closeCameraButton" class="close-camera">×</button>
            </div>
            <div class="camera-body">
                <div class="camera-container">
                    <video id="cameraVideo" autoplay playsinline></video>
                    <canvas id="cameraCanvas" hidden></canvas>
                    <div class="scan-overlay">
                        <div class="scan-frame"></div>
                    </div>
                </div>
                <div class="camera-status">
                    <div id="scanStatus" class="scan-status">Point camera at QR code</div>
                </div>
            </div>
            <div class="camera-controls">
                <button id="switchCameraButton" class="switch-camera-btn">Switch Camera</button>
                <button id="closeCameraBtn" class="close-camera-btn">Close</button>
            </div>
        </div>
    </div>
    
    <script type="module">
        import QrScanner from './lib/qr-scanner.min.js';
        QrScanner.WORKER_PATH = './lib/qr-scanner-worker.min.js';
        window.QrScanner = QrScanner;
    </script>
    <script src="src/utils/cloud-storage.js"></script>
    <script src="src/utils/theme.js"></script>
    <script type="module" src="src/utils/database.js"></script>
    <script src="src/utils/shared-utils.js"></script>
    <script src="src/js/app.js"></script>
</body>
</html>
